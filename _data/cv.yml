  summary: Researcher in computer architecture and systems for efficient machine learning acceleration.

  sections:
    Experience:
      - company: Purdue University
        position: Graduate Research Assistant
        location: West Lafayette, IN
        start_date: 2024-08
        end_date: present
        highlights:
          - Achieved 54.8% inference speedup by designing and validating a novel accelerator microarchitecture through custom cycle-level simulation and latency modeling.
          - Built a Python-based simulation and characterization framework to analyze MAC-level latency and accuracy trade-offs across multiple bitwidths, quantifying performance improvements of 17-55% over prior stochastic architectures.
          - Conducted architecture-performance exploration across CNN models, analyzing compute utilization and workload scaling behavior.

      - company: Hanyang University
        position: Undergraduate Research Assistant
        location: Seoul, Korea
        start_date: 2023-07
        end_date: 2023-12
        highlights:
          - Enabled deployment of a 13B-parameter Korean LLM on 16 GB GPUs by applying 4-bit QLoRA quantization, reducing memory usage by 82% while maintaining model quality.
          - Developed a domain-specific chatbot and end-to-end RAG pipeline, profiling latency and memory usage to understand practical constraints of GPU-based LLM inference.

      - company: Korea Institute of Science and Technology
        position: Co-op Research Engineer
        location: Seoul, Korea
        start_date: 2022-09
        end_date: 2023-02
        highlights:
          - Designed and implemented a compact FPGA-based digital lock-in amplifier using Vivado and Vitis, replacing bulky analog equipment for gas measurement and enabling parallel processing of multiple experiments.
          - Integrated real-time signal processing algorithms directly on FPGA hardware, eliminating dependency on external equipment while maintaining measurement accuracy comparable to traditional multi-instrument setups.
          - Developed a four-layer PCB for an edge computing system using Altium and Allegro, collaborating cross-functionally with hardware engineers to optimize board layout for real-time data processing performance.

