    Projects:
      - name: 8-bit Wallace Tree Multiplier for Low-Power VLSI Design
        summary: "Virtuoso, NanoTime (Sep. 2025 - Dec. 2025)"
        highlights:
          - Designed and implemented full-custom layout for the partial product generator and 4-stage reduction tree.
          - Developed an 8-bit MAC unit from schematic to layout by integrating a Wallace Tree multiplier with a 16-bit accumulator.
          - Achieved 28% lower delay and 26% lower energy consumption than target specifications under worst-case conditions.

      - name: Energy-efficient Systolic Array for Matrix Multiplication
        summary: "C, PyTorch, Verilog (Jan. 2025 - May 2025)"
        highlights:
          - Reduced CNN inference energy consumption by up to 30% without degrading accuracy.
          - Designed a systolic array architecture incorporating approximate multipliers.
          - Modeled and evaluated approximate multipliers in C and Verilog, then integrated them into CNN models for end-to-end accuracy analysis.

      - name: Thread-Aware GPU Prefetching
        summary: "C++, CUDA, Accel-Sim (Jan. 2025 - May 2025)"
        highlights:
          - Implemented a prefetch cache and per-warp, global, and inter-thread tracking tables to generate GPU prefetch requests.
          - Built a custom CUDA microbenchmark and evaluated IPC and L1/L2 cache miss rates on a V100 configuration.

      - name: Adaptive Cache Compression Policy
        summary: "Gem5, C++, Python (Aug. 2024 - Dec. 2024)"
        highlights:
          - Designed and implemented an adaptive L2 cache compression policy in Gem5 based on LRU replacement behavior.
          - Evaluated L2 miss rate and CPI against always-compress and never-compress baselines using SPEC benchmarks on an ARM processor.

      - name: Virtual Advanced Drum Machine (VAD)
        summary: "PyTorch, CUDA, Jetson Nano, OpenCV (Mar. 2023 - Jul. 2023)"
        highlights:
          - Developed core code for drumming pose estimation, simultaneous action handling, and peripheral device control.
          - Applied pose estimation to key-point tracking on Jetson Nano and created interactive audiovisual user experiences.

      - name: Virtual Drum Machine (VDrum)
        summary: "Python, Raspberry Pi, MediaPipe (Mar. 2023 - Jul. 2023)"
        highlights:
          - Built a Lingua Franca process to apply pose estimation on Raspberry Pi.
          - Connected peripherals and implemented control software for drum machine playback.

      - name: Swap Sort Simulation on Advanced RISC-V Pipeline
        summary: "Verilog, Vivado, RISC-V ISA (Mar. 2022 - Jul. 2022)"
        highlights:
          - Integrated swap sort simulation on an advanced RISC-V pipeline with FPGA verification.
          - Optimized the sorting algorithm in RISC-V assembly, reducing execution cycles by 90% and ranking top 8 of 40+ teams.

