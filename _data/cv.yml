        start_date: 2024-08
        end_date: present
        highlights:
          - Accelerated AI inference speed by 54.8% by designing a novel hardware architecture that optimizes neural network data processing while maintaining accuracy.
          - Developed a Python simulation framework to evaluate MAC-level accuracy and latency across multiple bitwidths, validating superior accuracy-latency tradeoffs versus prior stochastic architectures.
          - Improved processing efficiency by 17-55% across multiple neural network architectures, demonstrating scalability across AI applications.

      - company: Hanyang University
        position: Undergraduate Research Assistant
        location: Seoul, Korea
        start_date: 2023-07
        end_date: 2023-12
        highlights:
          - Enabled deployment of a 13B-parameter Korean LLM on a 16GB consumer GPU via QLoRA 4-bit quantization, reducing memory requirements by 82% while maintaining performance.
          - Built a domain-specific Korean chatbot by generating an 11k Q&A dataset through GPT-4-based data augmentation.
          - Developed an end-to-end RAG system combining a fine-tuned LLM with vector database retrieval, outperforming standalone ChatGPT and retrieval-only baselines on domain-specific questions.

      - company: Korea Institute of Science and Technology
        position: Co-op Research Engineer
        location: Seoul, Korea
        start_date: 2022-09
        end_date: 2023-02
        highlights:
          - Designed and implemented a compact FPGA-based digital lock-in amplifier using Vivado, Vitis, and Virtex-7 to replace bulky analog equipment for gas measurement.
          - Integrated real-time signal processing algorithms directly on FPGA hardware, eliminating dependency on external equipment while preserving measurement accuracy.
          - Developed a four-layer PCB for an edge computing system using Altium and Allegro in cross-functional collaboration with hardware engineers.

